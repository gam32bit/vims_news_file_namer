<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vims.edu News Story File Namer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; color: #333; background-color: #f4f4f4; }
        .box { border-radius: 12px; background: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; }
        
        /* VIMS Blue and White Header */
        .vims-header { 
            background: #00467F; 
            color: #ffffff; 
            padding: 25px; 
            text-align: center; 
            border-bottom: 5px solid #ad5410; /* VIMS Gold accent */
        }
        .vims-header h1 { margin: 0; font-size: 1.8em; letter-spacing: 0.5px; }

        .content { padding: 30px; }
        
        label { font-weight: bold; display: block; margin-top: 25px; margin-bottom: 10px; color: #00467F; font-size: 1.1em; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #00467F; outline: none; background-color: #f0f7f8; }
        
        /* Grouped Tag Styling */
        .tag-category { margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #666; font-size: 0.9em; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        
        .tag-btn { 
            padding: 8px 14px; border: 1px solid #00467F; border-radius: 25px; 
            cursor: pointer; background: #fff; font-size: 13px; font-weight: 500;
            transition: all 0.2s ease; color: #00467F;
        }
        .tag-btn:hover { background: #f0f7f8; }
        .tag-btn.active { background: #00467F; color: #fff; transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,49,60,0.3); }

        .result-container { background: #e9eff0; padding: 25px; border-radius: 10px; border: 2px dashed #00467F; margin-top: 20px; }
        .result-box { font-family: 'Courier New', Courier, monospace; font-size: 1.25em; font-weight: bold; color: #00467F; word-break: break-all; margin-bottom: 15px; }
        
        .instruction-step { font-size: 0.95em; color: #444; background: #fff; padding: 15px; border-radius: 6px; border-left: 4px solid #ad5410; }
        .highlight { color: #00467F; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="box">
    <div class="vims-header">
        <h1>Vims.edu News Story File Namer</h1>
    </div>
    
    <div class="content">
        <label for="titleInput">1. Paste your news page title here</label>
        <input type="text" id="titleInput" placeholder="e.g. New Research on Oyster Habitats" oninput="updateFilename()">

        <label>2. Select Tracking Tags <span style="font-weight: normal; font-size: 0.85em; color: #666;">(Select 1-2)</span></label>
        
        <div class="tag-category">Sections</div>
        <div id="sectionTags" class="tag-group"></div>

        <div class="tag-category">Research & Species</div>
        <div id="researchTags" class="tag-group"></div>

        <div class="tag-category">Institutional & Public Engagement</div>
        <div id="instTags" class="tag-group"></div>

        <label>3. Your Cascade File Name</label>
        <div class="result-container">
            <div class="result-box" id="result">...waiting for title...</div>
            
            <div class="instruction-step">
                <strong>Next Step:</strong> Copy this file name, right-click on your story file in Cascade, select <span class="highlight">"More"</span>, select <span class="highlight">"Rename"</span>, and then paste the new file name.
            </div>
        </div>
    </div>
</div>

<script>
    // Mapping for Sections
    const sections = {
        "Natural Resources": "nat-res",
        "Coastal & Ocean Processes": "coastal-ocean",
        "Ecosystem Health": "eco-health"
    };

    // Mapping for Research & Species
    const research = {
        "Oysters": "oysters",
        "Blue crabs": "blue-crabs",
        "Striped bass": "striped-bass",
        "SAV": "sav",
        "Chesapeake Bay": "bay",
        "Restoration": "restoration",
        "Aquaculture": "aquaculture",
        "Coastal Resilience": "resilience",
        "Climate change": "climate",
        "Living shorelines": "living-shorelines",
        "Annual Survey": "survey",
        "Fisheries Management": "fisheries"
    };

    // Mapping for Institutional
    const institutional = {
        "Batten School": "batten",
        "VIMS": "vims",
        "Public event": "event",
        "Research publication": "journal",
        "Award & recognition": "award",
        "Alumni": "alumni",
        "Giving": "giving"
    };

    let selectedTags = new Map(); // Using Map to keep track of category and value

    function createTagButtons(group, containerId) {
        const container = document.getElementById(containerId);
        Object.keys(group).forEach(humanName => {
            const btn = document.createElement('div');
            btn.className = 'tag-btn';
            btn.innerText = humanName;
            btn.onclick = () => toggleTag(humanName, group[humanName], btn);
            container.appendChild(btn);
        });
    }

    function toggleTag(humanName, urlCode, element) {
        if (selectedTags.has(humanName)) {
            selectedTags.delete(humanName);
            element.classList.remove('active');
        } else {
            selectedTags.set(humanName, urlCode);
            element.classList.add('active');
        }
        updateFilename();
    }

    function updateFilename() {
        let title = document.getElementById('titleInput').value;
        
        // Clean the title for SEO, limited to 6 words for URL readability
        let cleanTitle = title.toLowerCase()
            .replace(/[^\w\s-]/g, '')
            .trim()
            .split(/\s+/)
            .slice(0, 6)
            .join(' ')
            .replace(/\s+/g, '-');

        // Pull the short keywords
        let urlKeywords = Array.from(selectedTags.values());
        let finalName = cleanTitle;
        
        if (urlKeywords.length > 0) {
            finalName += '-' + urlKeywords.join('-');
        }

        const display = document.getElementById('result');
        if (title.length > 0) {
            display.innerText = finalName;
        } else {
            display.innerText = "...waiting for title...";
        }
    }

    // Initialize the tags
    createTagButtons(sections, 'sectionTags');
    createTagButtons(research, 'researchTags');
    createTagButtons(institutional, 'instTags');
</script>

</body>
</html>
