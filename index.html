<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIMS Cascade File Namer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; line-height: 1.6; color: #333; }
        .box { border: 2px solid #00313C; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .tag-group { margin-bottom: 15px; }
        .tag-btn { 
            display: inline-block; padding: 6px 12px; margin: 4px; border: 1px solid #00313C; 
            border-radius: 20px; cursor: pointer; background: white; font-size: 13px;
        }
        .tag-btn.active { background: #00313C; color: white; }
        .result-box { background: #eef; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 1.1em; border: 1px dashed #00313C; margin-top: 20px; word-break: break-all; }
        h3 { color: #00313C; margin-top: 0; }
    </style>
</head>
<body>

<div class="box">
    <h3>Cascade File Namer</h3>
    <p><small>Enter your story title and select 1-2 tags to generate a tracking-ready filename.</small></p>
    
    <label>1. Story Title</label>
    <input type="text" id="titleInput" placeholder="e.g. New Study on Oyster Restoration" oninput="updateFilename()">

    <label>2. Select Tracking Tags</label>
    <div id="tagContainer" class="tag-group">
        </div>

    <label>3. Your Cascade "System Name"</label>
    <div class="result-box" id="result">...waiting for title...</div>
    <p><small>Copy and paste this into the <strong>System Name</strong> field in Cascade.</small></p>
</div>

<script>
    const tags = [
        "nat-res", "coastal-ocean", "eco-health", "oysters", "blue-crabs", 
        "striped-bass", "seagrass", "aquaculture", "resilience", "climate", 
        "batten", "event", "journal", "award", "alumni"
    ];

    let selectedTags = new Set();

    function setupTags() {
        const container = document.getElementById('tagContainer');
        tags.forEach(tag => {
            const btn = document.createElement('div');
            btn.className = 'tag-btn';
            btn.innerText = tag;
            btn.onclick = () => toggleTag(tag, btn);
            container.appendChild(btn);
        });
    }

    function toggleTag(tag, element) {
        if (selectedTags.has(tag)) {
            selectedTags.delete(tag);
            element.classList.remove('active');
        } else {
            selectedTags.add(tag);
            element.classList.add('active');
        }
        updateFilename();
    }

    function updateFilename() {
        let title = document.getElementById('titleInput').value;
        
        // Clean the title for SEO
        let cleanTitle = title.toLowerCase()
            .replace(/[^\w\s-]/g, '') // Remove special chars
            .trim()
            .replace(/\s+/g, '-');    // Spaces to hyphens

        // Combine with tags
        let tagString = Array.from(selectedTags).join('-');
        let finalName = cleanTitle;
        
        if (tagString) {
            finalName += '-' + tagString;
        }

        document.getElementById('result').innerText = finalName + ".php";
    }

    setupTags();
</script>

</body>
</html>
