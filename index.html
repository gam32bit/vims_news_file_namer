<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIMS News Story File Namer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; color: #333; }
        .box { border: 2px solid #00313C; padding: 30px; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .vims-header { background: #00313C; color: #F0B323; padding: 15px; margin: -30px -30px 20px -30px; border-radius: 10px 10px 0 0; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 20px; margin-bottom: 8px; color: #00313C; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #00313C; outline: none; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag-btn { 
            padding: 8px 14px; border: 1px solid #00313C; border-radius: 25px; 
            cursor: pointer; background: #fff; font-size: 13px; font-weight: 500;
            transition: all 0.2s ease;
        }
        .tag-btn:hover { background: #f0f7f8; }
        .tag-btn.active { background: #00313C; color: #fff; transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .result-box { 
            background: #f4f4f4; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; 
            font-size: 1.2em; border: 2px dashed #00313C; margin-top: 15px; word-break: break-all; color: #00313C;
        }
        .instruction-step { font-size: 0.9em; color: #555; margin-top: 10px; }
        .highlight { color: #00313C; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <div class="vims-header">
        <h2 style="margin:0;">VIMS Story File Namer</h2>
    </div>
    
    <label for="titleInput">1. Story Title</label>
    <input type="text" id="titleInput" placeholder="Enter the headline here..." oninput="updateFilename()">

    <label>2. Select Tracking Tags <span style="font-weight: normal; font-size: 0.8em;">(Select 1-2)</span></label>
    <div id="tagContainer" class="tag-group"></div>

    <label>3. Your Cascade File Name</label>
    <div class="result-box" id="result">...waiting for title...</div>
    
    <div class="instruction-step">
        <strong>How to use this:</strong> Copy this file name, right-click on your story file in Cascade, select <span class="highlight">"More"</span>, select <span class="highlight">"Rename"</span>, and then paste the new file name.
    </div>
</div>

<script>
    // Mapping Human Names to the URL keywords for GTM tracking
    const tagMapping = {
        "Natural Resources": "nat-res",
        "Coastal & Ocean Processes": "coastal-ocean",
        "Ecosystem Health": "eco-health",
        "Oysters": "oysters",
        "Blue Crabs": "blue-crabs",
        "Striped Bass": "striped-bass",
        "Seagrass": "seagrass",
        "Aquaculture": "aquaculture",
        "Coastal Resilience": "resilience",
        "Climate Change": "climate",
        "Restoration": "restoration",
        "Batten School": "batten",
        "Public Event": "event",
        "Research Publication": "journal",
        "Award & Recognition": "award",
        "Alumni": "alumni",
        "Giving": "giving",
        "Chesapeake Bay": "bay",
        "Annual Survey": "survey",
        "Fisheries Management": "fisheries"
    };

    let selectedTags = new Set();

    function setupTags() {
        const container = document.getElementById('tagContainer');
        Object.keys(tagMapping).forEach(humanName => {
            const btn = document.createElement('div');
            btn.className = 'tag-btn';
            btn.innerText = humanName;
            btn.onclick = () => toggleTag(humanName, btn);
            container.appendChild(btn);
        });
    }

    function toggleTag(humanName, element) {
        if (selectedTags.has(humanName)) {
            selectedTags.delete(humanName);
            element.classList.remove('active');
        } else {
            selectedTags.add(humanName);
            element.classList.add('active');
        }
        updateFilename();
    }

    function updateFilename() {
        let title = document.getElementById('titleInput').value;
        
        // Clean the title for SEO
        let cleanTitle = title.toLowerCase()
            .replace(/[^\w\s-]/g, '') 
            .trim()
            .replace(/\s+/g, '-');    

        // Pull the short keywords for the URL
        let urlKeywords = Array.from(selectedTags).map(name => tagMapping[name]);
        let finalName = cleanTitle;
        
        if (urlKeywords.length > 0) {
            finalName += '-' + urlKeywords.join('-');
        }

        document.getElementById('result').innerText = finalName + ".php";
    }

    setupTags();
</script>

</body>
</html>
